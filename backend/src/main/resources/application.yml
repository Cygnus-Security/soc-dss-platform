server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: soc-dss-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:socdss;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  correlation:
    time-window-minutes: ${CORRELATION_TIME_WINDOW_MINUTES:15}
