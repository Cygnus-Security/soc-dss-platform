services:
  postgres:
    image: postgres:16-alpine
    container_name: soc-dss-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-socdss}
      POSTGRES_USER: ${POSTGRES_USER:-socdss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socdss_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - socdss-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socdss} -d ${POSTGRES_DB:-socdss}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: soc-dss-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-socdss}
      DB_USER: ${POSTGRES_USER:-socdss}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-socdss_password}
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - socdss-net
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: soc-dss-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - socdss-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  socdss-net:
    driver: bridge
